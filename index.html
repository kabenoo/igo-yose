<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>囲碁ヨセトレ</title>
  <style>
    :root{
      --bg:#f2efe8;
      --card:#fffdf8;
      --line:#2d2418;
      --panel-border:#dfd7c8;
      --board:#d9b36a;
      --board-dark:#c79e53;
      --blue1:#5a85ec;
      --blue2:#2f60d9;
      --green1:#49ab64;
      --green2:#369852;
      --plain:#e8dfcf;
      --danger1:#d85a4f;
      --danger2:#c93d32;
      --shadow:0 2px 10px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:var(--bg);
      color:#111;
    }
    .app{
      max-width:980px;
      margin:0 auto;
      padding:3px;
    }
    .titleCard,.boardCard,.bottomCard{
      background:rgba(255,253,248,.84);
      border:1px solid var(--panel-border);
      border-radius:16px;
      box-shadow:var(--shadow);
    }
    .titleCard{
      padding:6px 10px 4px;
      margin-bottom:4px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:58px;
      background:
        radial-gradient(circle at 18% 52%, rgba(205,241,215,.42), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(196,217,255,.32), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,245,239,.97));
    }
    .titleWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.18em;
      line-height:1;
      letter-spacing:.02em;
      font-weight:900;
      font-size:clamp(20px,8vw,38px);
      padding:4px 10px 6px;
      border-radius:999px;
      background:rgba(255,255,255,.70);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 8px 18px rgba(0,0,0,.07);
      white-space:nowrap;
    }
    .titleGreen,.titleBlue,.titleRed{
      display:inline-block;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:
        0 1px 0 rgba(255,255,255,.92),
        0 2px 8px rgba(0,0,0,.12);
    }
    .titleGreen{ background-image:linear-gradient(180deg,#35a960 0%,#168149 55%,#0b6c3a 100%); }
    .titleBlue{ background-image:linear-gradient(180deg,#4f8cff 0%,#2f65dd 55%,#1f4fb8 100%); }
    .titleRed{ background-image:linear-gradient(180deg,#ff6f68 0%,#df433d 55%,#c52f2a 100%); }

    .boardCard{
      padding:0;
      margin-bottom:4px;
      overflow:hidden;
    }
    .board-wrap{
      width:100%;
      aspect-ratio:1 / 1;
      max-width:min(96vw, 640px);
      margin:0 auto;
      position:relative;
      touch-action:manipulation;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      border-radius:15px;
      background:linear-gradient(135deg, var(--board), var(--board-dark));
    }

    .bottomCard{
      padding:4px;
    }
    .bottomGrid{
      display:grid;
      grid-template-columns:1fr 1fr 1.55fr;
      gap:4px;
      align-items:stretch;
    }
    .stack{
      display:grid;
      gap:4px;
      align-content:start;
    }
    button{
      width:100%;
      min-height:38px;
      border:none;
      border-radius:12px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
      -webkit-tap-highlight-color: transparent;
    }
    .btnBlue{
      background:linear-gradient(360deg,var(--blue1),var(--blue2));
      color:#fff;
    }
    .btnPlain{
      background:var(--plain);
      color:#2a2115;
    }
    .btnGreen{
      background:linear-gradient(180deg,var(--green1),var(--green2));
      color:#fff;
    }
    .btnGreen2{
      background:linear-gradient(180deg,var(--green1),var(--green2));
      color:#dff3fb;
    }
    .btnActive{
      outline:3px solid rgba(211,56,56,.20);
      background:#efe3d5;
    }
    .resultBox{
      min-height:80px;
      border-radius:12px;
      border:1px solid #ddd4c4;
      background:#fffdf8;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:20px;
      color:#382d1e;
      padding:8px 10px;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    @media (min-width: 641px){
      .app{ max-width:760px; padding:6px; }
      .titleCard{ min-height:68px; margin-bottom:6px; }
      .titleWrap{ font-size:32px; padding:6px 14px 8px; }
      .boardCard{ margin-bottom:6px; }
      .board-wrap{ max-width:min(92vw, 620px); }
      .bottomCard{ padding:6px; }
      .bottomGrid{ gap:6px; }
      button{ min-height:42px; font-size:15px; border-radius:14px; }
      .resultBox{ min-height:72px; font-size:28px; border-radius:14px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="titleCard">
    <div class="titleWrap">
      <span class="titleGreen">囲碁</span>
      <span class="titleBlue">ヨセ</span>
      <span class="titleRed">トレ</span>
    </div>
  </div>

  <div class="boardCard">
    <div class="board-wrap">
      <canvas id="boardCanvas" width="900" height="900"></canvas>
    </div>
  </div>

  <div class="bottomCard">
    <div class="bottomGrid">
      <div class="stack">
        <button class="btnGreen2" id="deadModeBtn">死石指定</button>
        <button class="btnPlain" id="undoBtn">一手戻る</button>
      </div>

      <div class="stack">
        <button class="btnGreen" id="scoreBtn">地合判定</button>
        <button class="btnPlain" id="resetBtn">初期画面</button>
      </div>

      <div class="stack">
        <div class="resultBox" id="resultBox">結　果</div>
        <button class="btnBlue" id="loadRandomBtn">問　題　読　込</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const SIZE = 9;
  const EMPTY = 0, BLACK = 1, WHITE = 2;
  const MODE_NORMAL = 'normal';
  const MODE_DEAD = 'dead';

  const canvas = document.getElementById('boardCanvas');
  const ctx = canvas.getContext('2d');
  const resultBox = document.getElementById('resultBox');
  const deadModeBtn = document.getElementById('deadModeBtn');

  const state = {
    initialBoard: createEmptyBoard(),
    board: createEmptyBoard(),
    toMove: BLACK,
    moveHistory: [],
    mode: MODE_NORMAL,
    deadStones: new Set(),
    problemNumbers: Array.from({length:100}, (_,i)=>i+1),
    currentProblemNo: null,
    lastMoveColor: null
  };

  function createEmptyBoard() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  }
  function cloneBoard(board) { return board.map(r => [...r]); }
  function boardKey(board) { return board.map(r => r.join('')).join('|'); }
  function inBounds(x, y) { return x >= 0 && x < SIZE && y >= 0 && y < SIZE; }
  function other(color) { return color === BLACK ? WHITE : BLACK; }
  function stoneKey(x, y) { return `${x},${y}`; }
  function parseStoneKey(key) {
    const [x, y] = key.split(',').map(Number);
    return { x, y };
  }
  function neighbors(x, y) {
    return [[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(([nx,ny]) => inBounds(nx,ny));
  }

  function groupAndLiberties(board, x, y) {
    const color = board[y][x];
    if (!color) return null;
    const stack = [[x, y]];
    const visited = new Set([stoneKey(x, y)]);
    const group = [];
    const liberties = new Set();
    while (stack.length) {
      const [cx, cy] = stack.pop();
      group.push([cx, cy]);
      for (const [nx, ny] of neighbors(cx, cy)) {
        const v = board[ny][nx];
        const k = stoneKey(nx, ny);
        if (v === EMPTY) liberties.add(k);
        else if (v === color && !visited.has(k)) {
          visited.add(k);
          stack.push([nx, ny]);
        }
      }
    }
    return { color, group, liberties };
  }

  function removeGroup(board, group) {
    for (const [x, y] of group) board[y][x] = EMPTY;
  }

  function placeStone(x, y) {
    if (!inBounds(x, y)) return;
    if (state.board[y][x] !== EMPTY) return;

    const beforeBoard = cloneBoard(state.board);
    const beforeToMove = state.toMove;
    const prevKey = state.moveHistory.length ? state.moveHistory[state.moveHistory.length - 1].beforeKey : null;

    const board = cloneBoard(state.board);
    board[y][x] = state.toMove;

    for (const [nx, ny] of neighbors(x, y)) {
      if (board[ny][nx] === other(state.toMove)) {
        const info = groupAndLiberties(board, nx, ny);
        if (info && info.liberties.size === 0) {
          removeGroup(board, info.group);
        }
      }
    }

    const selfInfo = groupAndLiberties(board, x, y);
    if (!selfInfo || selfInfo.liberties.size === 0) return;

    const newKey = boardKey(board);
    if (prevKey && newKey === prevKey) return;

    state.moveHistory.push({
      beforeBoard,
      beforeToMove,
      beforeKey: boardKey(beforeBoard),
      x, y,
      type: 'move'
    });
    state.board = board;
    state.lastMoveColor = state.toMove;
    state.toMove = other(state.toMove);
    state.deadStones.clear();
    if (state.currentProblemNo) {
      resultBox.textContent = `問題 ${String(state.currentProblemNo).padStart(3, '0')}`;
    }
    draw();
  }

  function undo() {
    const last = state.moveHistory.pop();
    if (!last) return;
    state.board = cloneBoard(last.beforeBoard);
    state.toMove = last.beforeToMove;
    state.deadStones.clear();
    state.mode = MODE_NORMAL;
    deadModeBtn.classList.remove('btnActive');
    state.lastMoveColor = state.moveHistory.length
      ? (state.moveHistory[state.moveHistory.length - 1].beforeToMove === BLACK ? WHITE : BLACK)
      : null;
    draw();
  }

  function resetToInitial() {
    state.board = cloneBoard(state.initialBoard);
    state.toMove = BLACK;
    state.moveHistory = [];
    state.mode = MODE_NORMAL;
    state.deadStones.clear();
    state.lastMoveColor = null;
    deadModeBtn.classList.remove('btnActive');
    if (state.currentProblemNo) {
      resultBox.textContent = `問題 ${String(state.currentProblemNo).padStart(3, '0')}`;
    } else {
      resultBox.textContent = '結　果';
    }
    draw();
  }

  function toggleDeadStone(x, y) {
    const stone = state.board[y][x];
    if (stone === EMPTY) return;
    const k = stoneKey(x, y);
    if (state.deadStones.has(k)) state.deadStones.delete(k);
    else state.deadStones.add(k);
    draw();
  }

  function scoreGame() {
    const board = cloneBoard(state.board);

    for (const k of state.deadStones) {
      const { x, y } = parseStoneKey(k);
      board[y][x] = EMPTY;
    }

    let blackStones = 0, whiteStones = 0;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === BLACK) blackStones++;
        else if (board[y][x] === WHITE) whiteStones++;
      }
    }

    const visited = new Set();
    let blackTerritory = 0, whiteTerritory = 0;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const k = stoneKey(x, y);
        if (board[y][x] !== EMPTY || visited.has(k)) continue;

        const queue = [[x, y]];
        visited.add(k);
        const empties = [[x, y]];
        const borders = new Set();

        while (queue.length) {
          const [cx, cy] = queue.shift();
          for (const [nx, ny] of neighbors(cx, cy)) {
            const v = board[ny][nx];
            const nk = stoneKey(nx, ny);
            if (v === EMPTY) {
              if (!visited.has(nk)) {
                visited.add(nk);
                queue.push([nx, ny]);
                empties.push([nx, ny]);
              }
            } else {
              borders.add(v);
            }
          }
        }

        if (borders.size === 1) {
          if (borders.has(BLACK)) blackTerritory += empties.length;
          else if (borders.has(WHITE)) whiteTerritory += empties.length;
        }
      }
    }

    let blackTotal = blackStones + blackTerritory;
    let whiteTotal = whiteStones + whiteTerritory;

    if (state.lastMoveColor === BLACK) {
      blackTotal -= 1;
    }

    const diff = blackTotal - whiteTotal;
    let verdict = '持碁';
    if (diff > 0) verdict = `黒 ${diff}目勝ち`;
    else if (diff < 0) verdict = `白 ${Math.abs(diff)}目勝ち`;

    resultBox.textContent = verdict;
  }

  function draw() {
    resizeCanvasForDPR();
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const margin = Math.round(w * 0.085);
    const span = (w - margin * 2) / (SIZE - 1);

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#2d2418';
    ctx.lineWidth = Math.max(2, w / 350);
    for (let i = 0; i < SIZE; i++) {
      const p = margin + i * span;
      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(w - margin, p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, h - margin);
      ctx.stroke();
    }

    const star = [2, 4, 6];
    for (const sx of star) {
      for (const sy of star) {
        if (((sx === 2 || sx === 6) && (sy === 2 || sy === 6)) || (sx === 4 && sy === 4)) {
          const cx = margin + sx * span;
          const cy = margin + sy * span;
          ctx.beginPath();
          ctx.arc(cx, cy, Math.max(5, w / 120), 0, Math.PI * 2);
          ctx.fillStyle = '#2d2418';
          ctx.fill();
        }
      }
    }

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const stone = state.board[y][x];
        if (stone === EMPTY) continue;
        const cx = margin + x * span;
        const cy = margin + y * span;
        const r = span * 0.43;

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.1, cx, cy, r);

        if (stone === BLACK) {
          grad.addColorStop(0, '#555');
          grad.addColorStop(1, '#000');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#d9d9d9');
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = Math.max(1.2, w / 700);
        ctx.stroke();

        if (state.deadStones.has(stoneKey(x, y))) {
          ctx.strokeStyle = '#e53935';
          ctx.lineWidth = Math.max(4, w / 160);
          ctx.beginPath();
          ctx.moveTo(cx - r*0.62, cy - r*0.62);
          ctx.lineTo(cx + r*0.62, cy + r*0.62);
          ctx.moveTo(cx + r*0.62, cy - r*0.62);
          ctx.lineTo(cx - r*0.62, cy + r*0.62);
          ctx.stroke();
        }
      }
    }
  }

  function resizeCanvasForDPR() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const width = Math.round(rect.width * dpr);
    const height = Math.round(rect.height * dpr);
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
  }

  function getIntersectionFromEvent(ev) {
    const rect = canvas.getBoundingClientRect();
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const margin = rect.width * 0.085;
    const span = (rect.width - margin * 2) / (SIZE - 1);
    const ix = Math.round((x - margin) / span);
    const iy = Math.round((y - margin) / span);
    if (!inBounds(ix, iy)) return null;
    const cx = margin + ix * span;
    const cy = margin + iy * span;
    const dist = Math.hypot(x - cx, y - cy);
    if (dist > span * 0.52) return null;
    return { x: ix, y: iy };
  }

  function handleBoardTap(ev) {
    ev.preventDefault();
    const p = getIntersectionFromEvent(ev);
    if (!p) return;

    if (state.mode === MODE_DEAD) {
      toggleDeadStone(p.x, p.y);
      return;
    }
    placeStone(p.x, p.y);
  }

  function sgfCoordToXY(coord) {
    if (!coord || coord.length < 2) return null;
    return { x: coord.charCodeAt(0) - 97, y: coord.charCodeAt(1) - 97 };
  }

  function loadSgfText(text) {
    const board = createEmptyBoard();
    const abMatches = [...text.matchAll(/AB((\[[a-i]{2}\])+)/g)];
    const awMatches = [...text.matchAll(/AW((\[[a-i]{2}\])+)/g)];

    const parseMulti = (matches, color) => {
      for (const m of matches) {
        const coords = [...m[1].matchAll(/\[([a-i]{2})\]/g)].map(v => v[1]);
        for (const c of coords) {
          const p = sgfCoordToXY(c);
          if (p && inBounds(p.x, p.y)) board[p.y][p.x] = color;
        }
      }
    };
    parseMulti(abMatches, BLACK);
    parseMulti(awMatches, WHITE);

    state.initialBoard = board;
    state.board = cloneBoard(board);
    state.toMove = /PL\[W\]/.test(text) ? WHITE : BLACK;
    state.moveHistory = [];
    state.mode = MODE_NORMAL;
    state.deadStones.clear();
    state.lastMoveColor = null;
    deadModeBtn.classList.remove('btnActive');
    draw();
  }

  async function loadProblem(no) {
    const num = String(no).padStart(3, '0');
    try {
      const res = await fetch(`sgf/${num}.sgf`, { cache: 'no-store' });
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      state.currentProblemNo = parseInt(num, 10);
      loadSgfText(text);
      resultBox.textContent = `問題 ${num}`;
    } catch (e) {
      resultBox.textContent = `sgf/${num}.sgf を読めません`;
    }
  }

  function randomProblemNo() {
    const arr = state.problemNumbers;
    return arr[Math.floor(Math.random() * arr.length)];
  }

  document.getElementById('loadRandomBtn').addEventListener('click', () => {
    loadProblem(randomProblemNo());
  });

  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('resetBtn').addEventListener('click', resetToInitial);

  deadModeBtn.addEventListener('click', () => {
    state.mode = state.mode === MODE_DEAD ? MODE_NORMAL : MODE_DEAD;
    deadModeBtn.classList.toggle('btnActive', state.mode === MODE_DEAD);
  });

  document.getElementById('scoreBtn').addEventListener('click', scoreGame);

  canvas.addEventListener('click', handleBoardTap);
  canvas.addEventListener('touchstart', handleBoardTap, { passive: false });
  window.addEventListener('resize', draw);

  draw();
})();
</script>
</body>
</html>
