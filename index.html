<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>囲碁ヨセトレ</title>
  <style>
    :root{
      --bg:#f2efe8;
      --panel:#ffffff;
      --line:#333;
      --sub:#666;
      --accent:#3867d6;
      --accent2:#2856c7;
      --danger:#d44234;
      --ok:#3da35a;
      --board:#d9b36a;
      --board-dark:#c79e53;
      --shadow:0 2px 10px rgba(0,0,0,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:var(--bg);
      color:#111;
    }
    .app{
      max-width:980px;
      margin:0 auto;
      padding:10px;
    }
    .top{
      display:grid;
      grid-template-columns: 1.2fr .9fr .9fr;
      gap:10px;
      margin-bottom:10px;
    }
    .card{
      background:rgba(255,255,255,.72);
      border:1px solid #dfd7c8;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:8px;
    }
    .titleBox{
      min-height:106px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding:18px 24px;
      background:
        radial-gradient(circle at 18% 50%, rgba(205,241,215,.55), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(196,217,255,.5), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.86), rgba(248,245,239,.9));
    }
    .appTitle{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      font-size:clamp(26px,4.5vw,44px);
      letter-spacing:.04em;
      line-height:1;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.68);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        0 10px 24px rgba(0,0,0,.08);
    }
    .titleGreen,.titleBlue{
      display:inline-block;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:
        0 1px 0 rgba(255,255,255,.85),
        0 3px 10px rgba(0,0,0,.10);
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.75));
    }
    .titleGreen{
      background-image:linear-gradient(180deg,#36a763 0%,#158148 55%,#0a6a38 100%);
    }
    .titleBlue{
      background-image:linear-gradient(180deg,#4e89ff 0%,#2c63dd 55%,#1f4fb8 100%);
    }
    .stack{display:grid; gap:8px;}
    .label{
      min-height:30px;
      border-radius:14px;
      border:1px solid #ddd4c4;
      background:#e8dfcf;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      color:#4b3f2d;
    }
    .btnGrid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
    .btnGrid1{display:grid; gap:8px;}
    button{
      width:100%;
      min-height:46px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
    }
    .btnBlue{
      background:linear-gradient(180deg,#5a85ec,#2f60d9);
      color:#fff;
    }
    .btnPlain{
      background:#e8dfcf;
      color:#2a2115;
    }
    .btnGreen{
      background:linear-gradient(180deg,#49ab64,#369852);
      color:#fff;
    }
    .btnRed{
      background:linear-gradient(180deg,#e05647,#cf3b2d);
      color:#fff;
    }
    .boardCard{
      background:rgba(255,255,255,.72);
      border:1px solid #dfd7c8;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:10px 8px;
      margin-bottom:10px;
    }
    .board-wrap{
      width:100%;
      aspect-ratio:1 / 1;
      max-width:min(92vw,720px);
      margin:0 auto;
      position:relative;
      touch-action:manipulation;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      border-radius:16px;
      background:linear-gradient(135deg, var(--board), var(--board-dark));
    }
    .bottom{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:start;
    }
    .resultBox{
      min-height:46px;
      border-radius:14px;
      border:1px solid #ddd4c4;
      background:#f3efe6;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:22px;
      color:#382d1e;
      padding:10px 12px;
      text-align:center;
    }
    .hidden{display:none}
    input[type=file]{display:none}
    @media (max-width: 860px){
      .top{grid-template-columns:1fr 1fr 1fr;}
    }
    @media (max-width: 640px){
      .app{padding:6px}
      .top,.bottom{gap:6px}
      .top{grid-template-columns:1.25fr .95fr .95fr;}
      .titleBox{min-height:86px;padding:12px 14px}
      .appTitle{font-size:clamp(18px,7vw,34px);padding:8px 12px;gap:6px}
      button{min-height:42px;font-size:15px;border-radius:12px}
      .label{min-height:28px;border-radius:12px;font-size:14px}
      .boardCard{padding:8px 4px}
      .board-wrap{max-width:min(98vw, 560px);}
      .resultBox{font-size:18px; min-height:42px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="card titleBox">
      <div class="appTitle">
        <span class="titleGreen">囲碁</span>
        <span class="titleBlue">ヨセトレ</span>
      </div>
    </div>

    <div class="card stack">
      <button class="btnBlue" id="loadRandomBtn">問題読込</button>
      <div class="btnGrid2">
        <button class="btnPlain" id="prevProblemBtn">前へ</button>
        <button class="btnPlain" id="nextProblemBtn">次へ</button>
      </div>
    </div>

    <div class="card stack">
      <div class="label">着手</div>
      <button class="btnPlain" id="undoBtn">一手戻る</button>
      <button class="btnPlain" id="deadModeBtn">死石選択</button>
    </div>
  </div>

  <div class="boardCard">
    <div class="board-wrap">
      <canvas id="boardCanvas" width="900" height="900"></canvas>
    </div>
  </div>

  <div class="bottom">
    <div class="card stack">
      <button class="btnPlain" id="saveKifuBtn">棋譜保存</button>
      <button class="btnRed" id="makeProblemBtn">問題作成</button>
      <input id="sgfFile" type="file" accept=".sgf" />
    </div>
    <div class="card stack">
      <button class="btnGreen" id="scoreBtn">判定</button>
      <div class="resultBox" id="resultBox">結果</div>
    </div>
  </div>
</div>

<script>
(() => {
  const SIZE = 9;
  const EMPTY = 0, BLACK = 1, WHITE = 2;
  const MODE_NORMAL = 'normal';
  const MODE_DEAD = 'dead';
  const MODE_EDIT = 'edit';

  const canvas = document.getElementById('boardCanvas');
  const ctx = canvas.getContext('2d');
  const resultBox = document.getElementById('resultBox');
  const sgfFileInput = document.getElementById('sgfFile');

  const state = {
    initialBoard: createEmptyBoard(),
    board: createEmptyBoard(),
    toMove: BLACK,
    moveHistory: [],
    mode: MODE_NORMAL,
    deadStones: new Set(),
    problemNumbers: Array.from({length:100}, (_,i)=>i+1),
    currentProblemNo: null,
    editModeActive: false,
    problemEditSaved: false,
    lastMoveColor: null
  };

  function createEmptyBoard() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  }
  function cloneBoard(board) { return board.map(r => [...r]); }
  function boardKey(board) { return board.map(r => r.join('')).join('|'); }
  function inBounds(x, y) { return x >= 0 && x < SIZE && y >= 0 && y < SIZE; }
  function other(color) { return color === BLACK ? WHITE : BLACK; }
  function stoneKey(x, y) { return `${x},${y}`; }
  function parseStoneKey(key) { const [x, y] = key.split(',').map(Number); return { x, y }; }

  function neighbors(x, y) {
    return [[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(([nx,ny]) => inBounds(nx,ny));
  }

  function groupAndLiberties(board, x, y) {
    const color = board[y][x];
    if (!color) return null;
    const stack = [[x, y]];
    const visited = new Set([stoneKey(x, y)]);
    const group = [];
    const liberties = new Set();
    while (stack.length) {
      const [cx, cy] = stack.pop();
      group.push([cx, cy]);
      for (const [nx, ny] of neighbors(cx, cy)) {
        const v = board[ny][nx];
        const k = stoneKey(nx, ny);
        if (v === EMPTY) liberties.add(k);
        else if (v === color && !visited.has(k)) {
          visited.add(k);
          stack.push([nx, ny]);
        }
      }
    }
    return { color, group, liberties };
  }

  function removeGroup(board, group) {
    for (const [x, y] of group) board[y][x] = EMPTY;
  }

  function placeStone(x, y) {
    if (!inBounds(x, y)) return { ok: false, message: '範囲外です。' };
    if (state.board[y][x] !== EMPTY) return { ok: false, message: 'その点には打てません。' };

    const beforeBoard = cloneBoard(state.board);
    const beforeToMove = state.toMove;
    const prevKey = state.moveHistory.length ? state.moveHistory[state.moveHistory.length - 1].beforeKey : null;

    const board = cloneBoard(state.board);
    board[y][x] = state.toMove;

    for (const [nx, ny] of neighbors(x, y)) {
      if (board[ny][nx] === other(state.toMove)) {
        const info = groupAndLiberties(board, nx, ny);
        if (info && info.liberties.size === 0) {
          removeGroup(board, info.group);
        }
      }
    }

    const selfInfo = groupAndLiberties(board, x, y);
    if (!selfInfo || selfInfo.liberties.size === 0) {
      return { ok: false, message: '自殺手です。' };
    }

    const newKey = boardKey(board);
    if (prevKey && newKey === prevKey) {
      return { ok: false, message: 'コウです。すぐには抜き返せません。' };
    }

    state.moveHistory.push({
      beforeBoard,
      beforeToMove,
      beforeKey: boardKey(beforeBoard),
      x, y,
      type: 'move'
    });
    state.board = board;
    state.lastMoveColor = state.toMove;
    state.toMove = other(state.toMove);
    state.deadStones.clear();
    draw();
    return { ok: true, message: '着手しました。' };
  }

  function undo() {
    const last = state.moveHistory.pop();
    if (!last) return;
    state.board = cloneBoard(last.beforeBoard);
    state.toMove = last.beforeToMove;
    state.deadStones.clear();
    state.mode = state.editModeActive ? MODE_EDIT : MODE_NORMAL;
    state.lastMoveColor = state.moveHistory.length ? (state.moveHistory[state.moveHistory.length - 1].beforeToMove === BLACK ? WHITE : BLACK) : null;
    draw();
  }

  function toggleDeadStone(x, y) {
    const stone = state.board[y][x];
    if (stone === EMPTY) return;
    const k = stoneKey(x, y);
    if (state.deadStones.has(k)) state.deadStones.delete(k);
    else state.deadStones.add(k);
    draw();
  }

  function cycleEditPoint(x, y) {
    const cur = state.initialBoard[y][x];
    let next = EMPTY;
    if (cur === EMPTY) next = BLACK;
    else if (cur === BLACK) next = WHITE;
    else next = EMPTY;
    state.initialBoard[y][x] = next;
    state.board = cloneBoard(state.initialBoard);
    state.toMove = BLACK;
    state.moveHistory = [];
    state.deadStones.clear();
    state.lastMoveColor = null;
    draw();
  }

  function scoreGame() {
    const board = cloneBoard(state.board);
    for (const k of state.deadStones) {
      const { x, y } = parseStoneKey(k);
      board[y][x] = EMPTY;
    }

    let blackStones = 0, whiteStones = 0;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === BLACK) blackStones++;
        else if (board[y][x] === WHITE) whiteStones++;
      }
    }

    const visited = new Set();
    let blackTerritory = 0, whiteTerritory = 0;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const k = stoneKey(x, y);
        if (board[y][x] !== EMPTY || visited.has(k)) continue;

        const queue = [[x, y]];
        visited.add(k);
        const empties = [[x, y]];
        const borders = new Set();

        while (queue.length) {
          const [cx, cy] = queue.shift();
          for (const [nx, ny] of neighbors(cx, cy)) {
            const v = board[ny][nx];
            const nk = stoneKey(nx, ny);
            if (v === EMPTY) {
              if (!visited.has(nk)) {
                visited.add(nk);
                queue.push([nx, ny]);
                empties.push([nx, ny]);
              }
            } else {
              borders.add(v);
            }
          }
        }

        if (borders.size === 1) {
          if (borders.has(BLACK)) blackTerritory += empties.length;
          else if (borders.has(WHITE)) whiteTerritory += empties.length;
        }
      }
    }

    let blackTotal = blackStones + blackTerritory;
    let whiteTotal = whiteStones + whiteTerritory;

    if (state.lastMoveColor === BLACK) {
      blackTotal -= 1;
    }

    const diff = blackTotal - whiteTotal;
    let verdict = '持碁';
    if (diff > 0) verdict = `黒 ${diff}目勝ち`;
    else if (diff < 0) verdict = `白 ${Math.abs(diff)}目勝ち`;
    resultBox.textContent = verdict;
  }

  function draw() {
    resizeCanvasForDPR();
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const margin = Math.round(w * 0.085);
    const span = (w - margin * 2) / (SIZE - 1);

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#2d2418';
    ctx.lineWidth = Math.max(2, w / 350);
    for (let i = 0; i < SIZE; i++) {
      const p = margin + i * span;
      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(w - margin, p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, h - margin);
      ctx.stroke();
    }

    const star = [2, 4, 6];
    for (const sx of star) {
      for (const sy of star) {
        if (((sx === 2 || sx === 6) && (sy === 2 || sy === 6)) || (sx === 4 && sy === 4)) {
          const cx = margin + sx * span;
          const cy = margin + sy * span;
          ctx.beginPath();
          ctx.arc(cx, cy, Math.max(5, w / 120), 0, Math.PI * 2);
          ctx.fillStyle = '#2d2418';
          ctx.fill();
        }
      }
    }

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const stone = state.board[y][x];
        if (stone === EMPTY) continue;
        const cx = margin + x * span;
        const cy = margin + y * span;
        const r = span * 0.43;

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        const grad = stone === BLACK
          ? ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.1, cx, cy, r)
          : ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.1, cx, cy, r);

        if (stone === BLACK) {
          grad.addColorStop(0, '#555');
          grad.addColorStop(1, '#000');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#d9d9d9');
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = Math.max(1.2, w / 700);
        ctx.stroke();

        if (state.deadStones.has(stoneKey(x, y))) {
          ctx.strokeStyle = '#e53935';
          ctx.lineWidth = Math.max(4, w / 160);
          ctx.beginPath();
          ctx.moveTo(cx - r*0.62, cy - r*0.62);
          ctx.lineTo(cx + r*0.62, cy + r*0.62);
          ctx.moveTo(cx + r*0.62, cy - r*0.62);
          ctx.lineTo(cx - r*0.62, cy + r*0.62);
          ctx.stroke();
        }
      }
    }
  }

  function resizeCanvasForDPR() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const width = Math.round(rect.width * dpr);
    const height = Math.round(rect.height * dpr);
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
  }

  function getIntersectionFromEvent(ev) {
    const rect = canvas.getBoundingClientRect();
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const margin = rect.width * 0.085;
    const span = (rect.width - margin * 2) / (SIZE - 1);
    const ix = Math.round((x - margin) / span);
    const iy = Math.round((y - margin) / span);
    if (!inBounds(ix, iy)) return null;
    const cx = margin + ix * span;
    const cy = margin + iy * span;
    const dist = Math.hypot(x - cx, y - cy);
    if (dist > span * 0.52) return null;
    return { x: ix, y: iy };
  }

  function handleBoardTap(ev) {
    ev.preventDefault();
    const p = getIntersectionFromEvent(ev);
    if (!p) return;

    if (state.mode === MODE_EDIT) {
      cycleEditPoint(p.x, p.y);
      return;
    }
    if (state.mode === MODE_DEAD) {
      toggleDeadStone(p.x, p.y);
      return;
    }
    placeStone(p.x, p.y);
  }

  function sgfCoordToXY(coord) {
    if (!coord || coord.length < 2) return null;
    return { x: coord.charCodeAt(0) - 97, y: coord.charCodeAt(1) - 97 };
  }

  function xyToSgfCoord(x, y) {
    return String.fromCharCode(97 + x) + String.fromCharCode(97 + y);
  }

  function loadSgfText(text) {
    const board = createEmptyBoard();
    const abMatches = [...text.matchAll(/AB((\[[a-i]{2}\])+)/g)];
    const awMatches = [...text.matchAll(/AW((\[[a-i]{2}\])+)/g)];

    const parseMulti = (matches, color) => {
      for (const m of matches) {
        const coords = [...m[1].matchAll(/\[([a-i]{2})\]/g)].map(v => v[1]);
        for (const c of coords) {
          const p = sgfCoordToXY(c);
          if (p && inBounds(p.x, p.y)) board[p.y][p.x] = color;
        }
      }
    };
    parseMulti(abMatches, BLACK);
    parseMulti(awMatches, WHITE);

    state.initialBoard = board;
    state.board = cloneBoard(board);
    state.toMove = /PL\[W\]/.test(text) ? WHITE : BLACK;
    state.moveHistory = [];
    state.mode = MODE_NORMAL;
    state.deadStones.clear();
    state.lastMoveColor = null;
    state.editModeActive = false;
    state.problemEditSaved = false;
    document.getElementById('makeProblemBtn').textContent = '問題作成';
    draw();
  }

  function buildCurrentGameSgf(name='kifu') {
    let sgf = `(;GM[1]FF[4]CA[UTF-8]AP[ChatGPT:YosePractice]SZ[9]GN[${name}]PL[B]\n`;
    const blacks = [];
    const whites = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (state.initialBoard[y][x] === BLACK) blacks.push(`[${xyToSgfCoord(x,y)}]`);
        if (state.initialBoard[y][x] === WHITE) whites.push(`[${xyToSgfCoord(x,y)}]`);
      }
    }
    sgf += `AB${blacks.join('')}\nAW${whites.join('')}\n`;
    for (const m of state.moveHistory) {
      if (m.type === 'move') {
        const color = m.beforeToMove === BLACK ? 'B' : 'W';
        sgf += `;${color}[${xyToSgfCoord(m.x,m.y)}]\n`;
      }
    }
    sgf += ')';
    return sgf;
  }

  function boardToSgf(board, name='problem') {
    const blacks = [];
    const whites = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === BLACK) blacks.push(`[${xyToSgfCoord(x,y)}]`);
        else if (board[y][x] === WHITE) whites.push(`[${xyToSgfCoord(x,y)}]`);
      }
    }
    return `(;GM[1]FF[4]CA[UTF-8]AP[ChatGPT:YosePractice]SZ[9]GN[${name}]PL[B]\nAB${blacks.join('')}\nAW${whites.join('')}\n)`;
  }

  function downloadText(filename, text) {
    const blob = new Blob([text], { type: 'application/x-go-sgf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function loadProblem(no) {
    const num = String(no).padStart(3, '0');
    try {
      const res = await fetch(`sgf/${num}.sgf`, { cache: 'no-store' });
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      state.currentProblemNo = parseInt(num, 10);
      loadSgfText(text);
      resultBox.textContent = `問題 ${num}`;
    } catch (e) {
      resultBox.textContent = `sgf/${num}.sgf を読めません`;
    }
  }

  function randomProblemNo() {
    const arr = state.problemNumbers;
    return arr[Math.floor(Math.random() * arr.length)];
  }

  document.getElementById('loadRandomBtn').addEventListener('click', () => {
    loadProblem(randomProblemNo());
  });
  document.getElementById('prevProblemBtn').addEventListener('click', () => {
    const cur = state.currentProblemNo || 1;
    loadProblem(Math.max(1, cur - 1));
  });
  document.getElementById('nextProblemBtn').addEventListener('click', () => {
    const cur = state.currentProblemNo || 1;
    loadProblem(Math.min(999, cur + 1));
  });
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('deadModeBtn').addEventListener('click', () => {
    state.mode = state.mode === MODE_DEAD ? MODE_NORMAL : MODE_DEAD;
  });
  document.getElementById('scoreBtn').addEventListener('click', scoreGame);
  document.getElementById('saveKifuBtn').addEventListener('click', () => {
    downloadText(`kifu_${Date.now()}.sgf`, buildCurrentGameSgf('kifu'));
  });
  document.getElementById('makeProblemBtn').addEventListener('click', () => {
    const btn = document.getElementById('makeProblemBtn');
    if (!state.editModeActive) {
      state.editModeActive = true;
      state.mode = MODE_EDIT;
      state.initialBoard = cloneBoard(state.board);
      state.moveHistory = [];
      state.deadStones.clear();
      state.lastMoveColor = null;
      btn.textContent = '問題保存';
      resultBox.textContent = '作成モード';
      draw();
      return;
    }
    downloadText(`problem_${Date.now()}.sgf`, boardToSgf(state.initialBoard, 'problem'));
    state.editModeActive = false;
    state.mode = MODE_NORMAL;
    btn.textContent = '問題作成';
    resultBox.textContent = '問題保存完了';
  });

  sgfFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => loadSgfText(reader.result);
    reader.readAsText(file, 'UTF-8');
  });

  canvas.addEventListener('click', handleBoardTap);
  canvas.addEventListener('touchstart', handleBoardTap, { passive: false });
  window.addEventListener('resize', draw);
  draw();
})();
</script>
</body>
</html>
